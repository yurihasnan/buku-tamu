<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buku Tamu Ditjen Bina Pemerintahan Desa</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: #f4f6f9; 
            padding: 20px; 
            display: flex; 
            justify-content: center; 
        }
        .container { 
            background-color: #ffffff; 
            padding: 30px; 
            border-radius: 8px; 
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); 
            width: 100%; 
            max-width: 500px; 
        }
        .header-area {
            text-align: center;
            margin-bottom: 25px;
        }
        .logo-kemendagri {
            width: 90px;
            height: auto;
            margin-bottom: 15px;
        }
        h2 { 
            color: #333; 
            margin: 0;
            font-size: 16px;
            line-height: 1.5;
            text-transform: uppercase;
            font-weight: 700;
        }
        .form-group { 
            margin-bottom: 15px; 
        }
        label { 
            display: block; 
            margin-bottom: 5px; 
            color: #666; 
            font-weight: 600; 
            font-size: 14px;
        }
        input[type="text"], input[type="tel"], input[type="number"], textarea { 
            width: 100%; 
            padding: 10px; 
            border: 1px solid #ccc; 
            border-radius: 4px; 
            box-sizing: border-box; 
            font-size: 14px;
        }
        textarea { 
            resize: vertical; 
            height: 80px; 
        }
        button { 
            width: 100%; 
            background-color: #1a5276; 
            color: white; 
            padding: 12px; 
            border: none; 
            border-radius: 4px; 
            font-size: 16px; 
            cursor: pointer; 
            font-weight: bold; 
            margin-top: 10px;
        }
        button:hover { 
            background-color: #113f5e; 
        }
        button:disabled { 
            background-color: #cccccc; 
            cursor: not-allowed; 
        }
    </style>
</head>

        <h2>Buku Tamu<br>Direktorat Jenderal Bina Pemerintahan Desa</h2>
    </div>

    <!-- Formulir Buku Tamu -->
    <form id="guestBookForm">
        <div class="form-group">
            <label for="nama">Nama Lengkap</label>
            <input type="text" id="nama" name="nama" placeholder="Masukkan nama lengkap Anda" required>
        </div>
        
        <div class="form-group">
            <label for="telepon">Nomor Telepon / WhatsApp</label>
            <input type="tel" id="telepon" name="telepon" placeholder="Contoh: 08123456xxx" required>
        </div>
        
        <div class="form-group">
            <label for="instansi">Asal Instansi</label>
            <input type="text" id="instansi" name="instansi" placeholder="Nama instansi/organisasi/lembaga" required>
        </div>

        <!-- Kolom Jumlah Rombongan -->
        <div class="form-group">
            <label for="jumlah_rombongan">Jumlah Rombongan</label>
            <input type="number" id="jumlah_rombongan" name="jumlah_rombongan" min="1" placeholder="Contoh: 1" required>
        </div>

        <!-- Kolom Bidang Yang Akan Ditemui -->
        <div class="form-group">
            <label for="bidang">Bidang Yang Akan Ditemui</label>
            <input type="text" id="bidang" name="bidang" placeholder="Contoh: Bagian Kepegawaian / Dit. Kelembagaan" required>
        </div>
        
        <div class="form-group">
            <label for="tujuan">Tujuan Kunjungan</label>
            <textarea id="tujuan" name="tujuan" placeholder="Maksud dan tujuan kedatangan" required></textarea>
        </div>
        
        <button type="submit" id="submitBtn">Kirim Data</button>
    </form>
</div>

<script>
    // PENTING: Ganti dengan URL Web App dari Google Apps Script Anda yang baru
    const scriptURL = 'https://script.google.com/macros/s/AKfycbx9MYPUmPDTibds5ofkgTyloB55gkkNnYq-g-mgRbc9g7j6YlymC8gGyKw0t18xpQv7/exec';
    const form = document.getElementById('guestBookForm');
    const btn = document.getElementById('submitBtn');

    form.addEventListener('submit', e => {
        e.preventDefault();
        
        btn.disabled = true;
        btn.innerHTML = "Mengirim...";

        fetch(scriptURL, { method: 'POST', body: new FormData(form)})
            .then(response => {
                btn.disabled = false;
                btn.innerHTML = "Kirim Data";
                alert("Terima kasih! Data Anda berhasil disimpan.");
                form.reset(); 
            })
            .catch(error => {
                btn.disabled = false;
                btn.innerHTML = "Kirim Data";
                alert("Terjadi kesalahan saat mengirim data. Silakan coba lagi.");
                console.error('Error!', error.message);
            });
    });
</script>

</body>
</html>

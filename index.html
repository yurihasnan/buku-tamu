<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buku Tamu Ditjen Bina Pemerintahan Desa</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: #f0f2f5; 
            padding: 20px; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container { 
            background-color: #ffffff; 
            padding: 40px 30px; 
            border-radius: 12px; 
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.08); 
            width: 100%; 
            max-width: 480px; 
        }
        .header-area {
            text-align: center;
            margin-bottom: 30px;
        }
        
        /* Gaya untuk Logo SVG yang ditanam */
        .svg-logo-container {
            width: 100px;
            height: auto;
            margin: 0 auto 15px auto;
            display: block;
        }
        
        h2 { 
            color: #2c3e50; 
            margin: 0;
            font-size: 16px;
            line-height: 1.5;
            text-transform: uppercase;
            font-weight: 800;
            letter-spacing: 0.5px;
        }
        
        .form-group { 
            margin-bottom: 18px; 
        }
        
        label { 
            display: block; 
            margin-bottom: 7px; 
            color: #4a5568; 
            font-weight: 600; 
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        
        input[type="text"], input[type="tel"], textarea { 
            width: 100%; 
            padding: 12px 15px; 
            border: 1px solid #e2e8f0; 
            border-radius: 6px; 
            box-sizing: border-box; 
            font-size: 14px;
            transition: border-color 0.2s;
        }
        
        input:focus, textarea:focus {
            outline: none;
            border-color: #1a5276;
            box-shadow: 0 0 0 3px rgba(26, 82, 118, 0.1);
        }
        
        textarea { 
            resize: vertical; 
            height: 100px; 
        }
        
        button { 
            width: 100%; 
            background-color: #1a5276; 
            color: white; 
            padding: 14px; 
            border: none; 
            border-radius: 6px; 
            font-size: 16px; 
            cursor: pointer; 
            font-weight: bold; 
            margin-top: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: background-color 0.2s;
        }
        
        button:hover { 
            background-color: #113f5e; 
        }
        
        button:disabled { 
            background-color: #a0aec0; 
            cursor: not-allowed; 
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Bagian Header: Logo (Embedded SVG) & Judul -->
    <div class="header-area">
        <!-- INI ADALAH KODE SVG MURNI LOGO KEMENDAGRI YANG DITANAM SECARA LANGSUNG -->
        <div class="svg-logo-container">
            <svg version="1.1" id="Layer_1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" x="0px" y="0px"
                 viewBox="0 0 100 100" style="enable-background:new 0 0 100 100;" xml:space="preserve">
            <g>
                <path style="fill:#FFFFFF;stroke:#333333;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;stroke-miterlimit:10;" d="M50.4,2c-1.3,0-2.5,0.7-3.2,1.8l-18.4,32c-0.7,1.1-0.7,2.5,0,3.6L47.2,71.4c0.7,1.1,1.9,1.8,3.2,1.8h1c1.3,0,2.5-0.7,3.2-1.8l18.4-32c0.7-1.1,0.7-2.5,0-3.6l-18.4-32C53.9,2.7,52.7,2,51.4,2L50.4,2z"/>
                <path style="fill:#FFFFFF;stroke:#333333;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;stroke-miterlimit:10;" d="M26.2,46.7c-1.3,0-2.5,0.7-3.2,1.8l-18.4,32c-0.7,1.1-0.7,2.5,0,3.6L23,116.1c0.7,1.1,1.9,1.8,3.2,1.8h1c1.3,0,2.5-0.7,3.2-1.8l18.4-32c0.7-1.1,0.7-2.5,0-3.6L30.4,48.5C29.7,47.4,28.5,46.7,27.2,46.7L26.2,46.7z"/>
                <path style="fill:#FFFFFF;stroke:#333333;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;stroke-miterlimit:10;" d="M74.8,46.7c-1.3,0-2.5,0.7-3.2,1.8l-18.4,32c-0.7,1.1-0.7,2.5,0,3.6L71.6,116.1c0.7,1.1,1.9,1.8,3.2,1.8h1c1.3,0,2.5-0.7,3.2-1.8l18.4-32c0.7-1.1,0.7-2.5,0-3.6L79,48.5C78.3,47.4,77.1,46.7,75.8,46.7L74.8,46.7z"/>
                <polygon style="fill:#FFC107;" points="50.9,46.2 55.4,37.1 65.5,35.6 58.2,28.5 59.9,18.4 50.9,23.2 41.8,18.4 43.6,28.5 36.3,35.6 46.3,37.1 50.9,46.2 "/>
                <circle style="fill:#D32F2F;" cx="50.9" cy="46.2" r="3.2"/>
                <polygon style="fill:#FFC107;" points="26.7,90.9 31.2,81.8 41.3,80.3 34,73.2 35.7,63.1 26.7,67.9 17.6,63.1 19.4,73.2 12.1,80.3 22.1,81.8 26.7,90.9 "/>
                <circle style="fill:#D32F2F;" cx="26.7" cy="90.9" r="3.2"/>
                <polygon style="fill:#FFC107;" points="75.3,90.9 79.8,81.8 89.9,80.3 82.6,73.2 84.3,63.1 75.3,67.9 66.2,63.1 68,73.2 60.7,80.3 70.7,81.8 75.3,90.9 "/>
                <circle style="fill:#D32F2F;" cx="75.3" cy="90.9" r="3.2"/>
            </g>
            </svg>
        </div>
        <h2>Buku Tamu<br>Direktorat Jenderal Bina Pemerintahan Desa</h2>
    </div>

    <!-- Formulir Buku Tamu -->
    <form id="guestBookForm">
        <div class="form-group">
            <label for="nama">Nama Lengkap</label>
            <input type="text" id="nama" name="nama" placeholder="Masukkan nama lengkap" required>
        </div>
        <div class="form-group">
            <label for="telepon">Nomor Telepon / WhatsApp</label>
            <input type="tel" id="telepon" name="telepon" placeholder="Contoh: 0812345678" required>
        </div>
        <div class="form-group">
            <label for="instansi">Asal Instansi / Lembaga</label>
            <input type="text" id="instansi" name="instansi" placeholder="Nama Perusahaan/Lembaga/Pribadi" required>
        </div>
        <div class="form-group">
            <label for="tujuan">Tujuan Kunjungan</label>
            <textarea id="tujuan" name="tujuan" placeholder="Maksud dan tujuan kedatangan" required></textarea>
        </div>
        <button type="submit" id="submitBtn">Kirim Data</button>
    </form>
</div>

<script>
    // PENTING: Ganti teks di bawah ini dengan URL Web App dari Google Apps Script Anda yang baru
    const scriptURL = 'PASTE_URL_WEB_APP_ANDA_DISINI';
    const form = document.getElementById('guestBookForm');
    const btn = document.getElementById('submitBtn');

    form.addEventListener('submit', e => {
        e.preventDefault();
        
        btn.disabled = true;
        btn.innerHTML = "Mengirim...";

        fetch(scriptURL, { method: 'POST', body: new FormData(form)})
            .then(response => {
                btn.disabled = false;
                btn.innerHTML = "Kirim Data";
                alert("Terima kasih! Data Anda berhasil disimpan.");
                form.reset(); 
            })
            .catch(error => {
                btn.disabled = false;
                btn.innerHTML = "Kirim Data";
                alert("Terjadi kesalahan saat mengirim data. Silakan coba lagi.");
                console.error('Error!', error.message);
            });
    });
</script>

</body>
</html>
